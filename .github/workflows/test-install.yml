name: Test Install

on:
  push:
    branches: [main, fix/onboarding-improvements]
  pull_request:
    branches: [main]

jobs:
  macos-install:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stow
        run: brew install stow

      - name: Preflight checks
        run: make preflight

      - name: Stow all packages (fresh machine)
        run: |
          set -o pipefail
          # Pre-create directories to avoid tree folding
          make install 2>&1 | tee /tmp/install.log
          echo ""
          echo "── Verifying symlinks ──"
          # Check a sample of critical symlinks exist
          for f in \
            ~/.gitconfig \
            ~/.config/fish/config.fish \
            ~/.config/starship.toml \
            ~/.bashrc \
            ~/.vimrc \
            ~/.tmux.conf \
            ~/.npmrc \
            ~/.gitmux.conf; do
            if [ -L "$f" ]; then
              echo "  ✔ $f -> $(readlink "$f")"
            elif [ -e "$f" ]; then
              echo "  ✘ $f exists but is NOT a symlink"
              exit 1
            else
              echo "  ⚠ $f does not exist (package may have been skipped)"
            fi
          done

      - name: Unstow + restow roundtrip
        run: |
          set -o pipefail
          make uninstall
          # Verify symlinks are removed
          if [ -L ~/.gitconfig ]; then
            echo "✘ ~/.gitconfig still symlinked after uninstall"
            exit 1
          fi
          echo "✔ Uninstall clean"
          # Re-stow
          make install 2>&1 | tail -5
          if [ -L ~/.gitconfig ]; then
            echo "✔ Restow successful"
          else
            echo "✘ Restow failed"
            exit 1
          fi

      - name: Clean check (no broken symlinks)
        run: make clean

  linux-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stow
        run: sudo apt-get update && sudo apt-get install -y stow

      - name: Stow Linux packages
        run: |
          LINUX_PACKAGES="bash fish starship git vim tmux claude codex"
          # Pre-create directories
          for pkg in $LINUX_PACKAGES; do
            if [ -d "$pkg" ]; then
              find "$pkg" -mindepth 1 -type d | while read -r d; do
                target="$HOME/${d#$pkg/}"
                mkdir -p "$target" 2>/dev/null || true
              done
            fi
          done
          # Backup conflicting files (handles both old and new stow error formats)
          for pkg in $LINUX_PACKAGES; do
            if [ -d "$pkg" ]; then
              conflicts=$(stow -n "$pkg" 2>&1 | \
                sed -n 's/.*over existing target \([^ ]*\) since.*/\1/p; s/.*existing target is neither a link nor a directory: //p')
              for rel in $conflicts; do
                target="$HOME/$rel"
                if [ -f "$target" ] && [ ! -L "$target" ]; then
                  mv "$target" "$target.bak"
                  echo "  Backed up $rel"
                fi
              done
            fi
          done
          # Stow
          for pkg in $LINUX_PACKAGES; do
            if [ -d "$pkg" ]; then
              echo "Stowing $pkg ..."
              stow --verbose "$pkg"
            fi
          done

      - name: Verify symlinks
        run: |
          for f in ~/.gitconfig ~/.bashrc ~/.vimrc ~/.tmux.conf; do
            if [ -L "$f" ]; then
              echo "  ✔ $f"
            else
              echo "  ✘ $f missing or not a symlink"
              exit 1
            fi
          done
